<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#212121"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
    <!-- キーキャップ本体グラデーション（立体感） -->
    <linearGradient id="keycap_top" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#252525"/>
    </linearGradient>
    <!-- キーキャップ側面（暗め） -->
    <linearGradient id="keycap_side_r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="keycap_side_b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <!-- 稲妻グラデーション -->
    <linearGradient id="bolt2" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#6de8ba"/>
      <stop offset="45%" stop-color="#2e8b67"/>
      <stop offset="100%" stop-color="#1a5e44"/>
    </linearGradient>
    <filter id="shadow2" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- squircle背景 -->
  <rect width="1024" height="1024" rx="229" fill="url(#bg2)"/>

  <!-- 床のグロー反射 -->
  <ellipse cx="512" cy="860" rx="300" ry="40" fill="#2e8b67" opacity="0.12"/>

  <!-- キーキャップ3Dアイソメトリック構成 -->
  <!-- 左側面 -->
  <path d="M182 340 L182 700 L242 760 L242 400 Z" fill="url(#keycap_side_b)" opacity="0.9"/>
  <!-- 右側面 -->
  <path d="M782 340 L842 400 L842 760 L782 700 Z" fill="url(#keycap_side_r)" opacity="0.9"/>
  <!-- 底面 -->
  <path d="M182 700 L242 760 L842 760 L782 700 Z" fill="#121212" opacity="0.95"/>
  <!-- 天板本体 -->
  <rect x="182" y="260" width="600" height="440" rx="48" fill="url(#keycap_top)" filter="url(#shadow2)"/>
  <!-- 天板インナーリセス（押し込み凹み表現） -->
  <rect x="212" y="290" width="540" height="380" rx="32" fill="#2b2b2b"/>
  <!-- 天板内ハイライト（上縁・左縁の反射光） -->
  <rect x="212" y="290" width="540" height="4" rx="2" fill="#505050" opacity="0.7"/>
  <rect x="212" y="290" width="4" height="380" rx="2" fill="#484848" opacity="0.5"/>

  <!-- 稲妻ロゴ（キーキャップ天板中央・エンボス風） -->
  <!-- 影オフセット -->
  <path d="M565 308 L370 528 L468 528 L459 672 L655 452 L557 452 Z"
        fill="#1a5e44" opacity="0.5" transform="translate(3,4)"/>
  <!-- 本体稲妻 -->
  <path d="M565 308 L370 528 L468 528 L459 672 L655 452 L557 452 Z"
        fill="url(#bolt2)" filter="url(#glow2)"/>
  <!-- ハイライト上部 -->
  <path d="M565 308 L370 528 L400 528 L595 308 Z" fill="#9affd8" opacity="0.3"/>
</svg>
